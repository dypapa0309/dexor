services:
  - type: web
    name: dexor
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    disk:
      name: dexor-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEXOR_DATA_DIR
        value: /var/data
      - key: APP_URL
        sync: false
      - key: API_URL
        sync: false
      - key: NAVER_CLIENT_ID
        sync: false
      - key: NAVER_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: TOSS_CLIENT_KEY
        sync: false
      - key: TOSS_SECRET_KEY
        sync: false
